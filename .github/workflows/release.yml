name: 发布正式版

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 发布 tag，例如 v1.0.0
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}-${{ inputs.tag }}
  cancel-in-progress: false

env:
  APP_NAME: sky-tv
  FLUTTER_CHANNEL: stable

jobs:
  static-check:
    name: 静态检查
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: 拉取代码
        uses: actions/checkout@v6

      - name: 配置 Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: 获取依赖
        run: |
          echo "获取 Flutter 依赖"
          flutter pub get

      - name: 检查代码格式
        run: |
          echo "检查 Dart 代码格式"
          dart format --set-exit-if-changed lib test

      - name: 代码静态分析
        run: |
          echo "执行 flutter analyze"
          flutter analyze

      - name: 单元测试
        run: |
          echo "执行 dart test"
          dart test

  android:
    name: Android 正式版
    runs-on: ubuntu-latest
    needs: static-check
    timeout-minutes: 45
    env:
      SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
    steps:
      - name: 拉取代码
        uses: actions/checkout@v6

      - name: 配置 Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: 配置 Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: 校验 Android 签名信息
        shell: bash
        run: |
          echo "校验 Android PKCS#12 签名信息"
          test -n "$SIGNING_KEY_BASE64"
          test -n "$KEY_ALIAS"
          test -n "$KEY_STORE_PASSWORD"
          test -n "$KEY_PASSWORD"

      - name: 写入 Android 签名文件
        shell: bash
        run: |
          echo "写入临时 PKCS#12 签名文件"
          printf '%s' "$SIGNING_KEY_BASE64" | base64 --decode > android/app/release-key.p12

      - name: 获取依赖
        run: |
          echo "获取 Flutter 依赖"
          flutter pub get

      - name: 构建 Android APK 分 ABI
        shell: bash
        env:
          SIGNING_KEY_PATH: ${{ github.workspace }}/android/app/release-key.p12
        run: |
          echo "构建 Android 正式版 APK：armeabi-v7a、arm64-v8a"
          VERSION_NAME="${{ inputs.tag }}"
          VERSION_NAME="${VERSION_NAME#v}"
          flutter build apk --release \
            --target-platform android-arm,android-arm64 \
            --split-per-abi \
            --build-name "$VERSION_NAME" \
            --build-number "${{ github.run_number }}"

      - name: 整理 Android 产物
        shell: bash
        run: |
          echo "整理 Android 正式版文件"
          mkdir -p dist
          cp build/app/outputs/flutter-apk/*-release.apk dist/

      - name: 上传 Android 产物
        uses: actions/upload-artifact@v7
        with:
          name: android-release
          path: dist/*
          if-no-files-found: error

  windows:
    name: Windows x64 正式版
    runs-on: windows-latest
    needs: static-check
    timeout-minutes: 45
    steps:
      - name: 拉取代码
        uses: actions/checkout@v6

      - name: 配置 Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: 获取依赖
        run: |
          echo "获取 Flutter 依赖"
          flutter pub get

      - name: 构建 Windows x64
        run: |
          echo "构建 Windows x64 正式版"
          flutter build windows --release

      - name: 打包 Windows 产物
        shell: pwsh
        run: |
          echo "压缩 Windows x64 正式版"
          New-Item -ItemType Directory -Force dist | Out-Null
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath dist\sky-tv-windows-x64.zip -Force

      - name: 上传 Windows 产物
        uses: actions/upload-artifact@v7
        with:
          name: windows-release
          path: dist/sky-tv-windows-x64.zip
          if-no-files-found: error

  linux:
    name: Linux x64 正式版
    runs-on: ubuntu-latest
    needs: static-check
    timeout-minutes: 45
    steps:
      - name: 拉取代码
        uses: actions/checkout@v6

      - name: 安装 Linux 构建依赖
        run: |
          echo "安装 Linux 桌面构建依赖"
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libasound2-dev libmpv-dev

      - name: 配置 Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: 获取依赖
        run: |
          echo "获取 Flutter 依赖"
          flutter pub get

      - name: 构建 Linux x64
        run: |
          echo "构建 Linux x64 正式版"
          flutter build linux --release

      - name: 打包 Linux 产物
        run: |
          echo "压缩 Linux x64 正式版"
          mkdir -p dist
          tar -czf dist/sky-tv-linux-x64.tar.gz -C build/linux/x64/release/bundle .

      - name: 上传 Linux 产物
        uses: actions/upload-artifact@v7
        with:
          name: linux-release
          path: dist/sky-tv-linux-x64.tar.gz
          if-no-files-found: error

  macos:
    name: macOS 正式版未签名包
    runs-on: macos-latest
    needs: static-check
    timeout-minutes: 60
    steps:
      - name: 拉取代码
        uses: actions/checkout@v6

      - name: 配置 Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: 获取依赖
        run: |
          echo "获取 Flutter 依赖"
          flutter pub get

      - name: 安装 DMG 打包工具
        run: |
          echo "安装 create-dmg"
          brew install create-dmg

      - name: 构建 macOS 正式版
        run: |
          echo "构建 macOS 正式版"
          flutter build macos --release

      - name: 打包 macOS DMG
        run: |
          echo "打包 macOS 正式版未签名 DMG"
          mkdir -p dist
          APP_PATH="$(find build/macos/Build/Products/Release -maxdepth 1 -name '*.app' -print -quit)"
          test -n "$APP_PATH"
          DMG_ROOT="$(mktemp -d)"
          cp -R "$APP_PATH" "$DMG_ROOT/"
          create-dmg \
            --volname "sky-tv" \
            --app-drop-link 600 185 \
            dist/sky-tv-macos-unsigned.dmg \
            "$DMG_ROOT"

      - name: 上传 macOS 产物
        uses: actions/upload-artifact@v7
        with:
          name: macos-release
          path: dist/sky-tv-macos-unsigned.dmg
          if-no-files-found: error

  ios:
    name: iOS arm64 正式版未签名包
    runs-on: macos-latest
    needs: static-check
    timeout-minutes: 60
    steps:
      - name: 拉取代码
        uses: actions/checkout@v6

      - name: 配置 Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: 获取依赖
        run: |
          echo "获取 Flutter 依赖"
          flutter pub get

      - name: 构建 iOS 未签名包
        run: |
          echo "构建 iOS 正式版未签名应用"
          flutter build ios --release --no-codesign

      - name: 整理 iOS IPA
        run: |
          echo "整理 iOS 正式版未签名 IPA"
          mkdir -p dist/Payload
          cp -R build/ios/iphoneos/Runner.app dist/Payload/
          (cd dist && zip -qry sky-tv-ios-arm64-unsigned.ipa Payload)
          rm -rf dist/Payload

      - name: 上传 iOS 产物
        uses: actions/upload-artifact@v7
        with:
          name: ios-release
          path: dist/sky-tv-ios-arm64-unsigned.ipa
          if-no-files-found: error

  publish:
    name: 发布到 GitHub Release
    runs-on: ubuntu-latest
    if: ${{ always() && needs.static-check.result == 'success' }}
    needs:
      - static-check
      - android
      - windows
      - linux
      - macos
      - ios
    timeout-minutes: 15
    steps:
      - name: 拉取代码
        uses: actions/checkout@v6

      - name: 下载全部构建产物
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts
          merge-multiple: true

      - name: 汇总构建结果
        shell: bash
        env:
          ANDROID_RESULT: ${{ needs.android.result }}
          WINDOWS_RESULT: ${{ needs.windows.result }}
          LINUX_RESULT: ${{ needs.linux.result }}
          MACOS_RESULT: ${{ needs.macos.result }}
          IOS_RESULT: ${{ needs.ios.result }}
        run: |
          echo "汇总构建结果"
          test -d release-artifacts
          find release-artifacts -maxdepth 1 -type f | sort
          test "$(find release-artifacts -maxdepth 1 -type f | wc -l)" -gt 0
          {
            echo "sky-tv 构建产物。"
            echo
            echo "构建结果："
            echo "- Android: $ANDROID_RESULT"
            echo "- Windows: $WINDOWS_RESULT"
            echo "- Linux: $LINUX_RESULT"
            echo "- macOS: $MACOS_RESULT"
            echo "- iOS: $IOS_RESULT"
          } > release-notes.md

      - name: 发布 Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          echo "发布 GitHub Release：$RELEASE_TAG"
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release 已存在，覆盖上传产物"
            gh release upload "$RELEASE_TAG" release-artifacts/* --clobber
            gh release edit "$RELEASE_TAG" --notes-file release-notes.md
          else
            echo "创建新的 Release"
            gh release create "$RELEASE_TAG" release-artifacts/* \
              --target "$GITHUB_SHA" \
              --title "$RELEASE_TAG" \
              --notes-file release-notes.md
          fi
